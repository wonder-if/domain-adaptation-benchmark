amp: true
control:
  interval: 1
  log_interval: 1
  max_iter: 1
  save_model: false
  seed:
    flag: false
    seed: 2022
dataset:
  augmentation:
  - clip-randomcrop
  - clip-strong_2
  balanced: true
  batchsize: 32
  name: office
  num_workers: 0
  shared: 10
  source_private: 10
  target_private: 11
  task: aw
  val_batchsize: 256
  val_source: false
exp_name: smoke_office_aw_1iter
gpu: 0,
lightning: false
logger: DEBUG
logger_console: false
lr_schedule:
  lr_cfg:
    gamma: 10
    power: 0.75
  max_iter: 1
  type: inv
  warmup_iter: 0
  warmup_min_lr: 1.0e-05
  warmup_type: linear
method: TASC
method_args:
  TASC:
    K_beam: 1
    K_s: 64
    n_inner: 1
    num_clusters_dict:
      domainnet: 400
      office: 100
      officehome: 100
      visda: 100
  ce_prob_temp: 0.02
  ent_temp: 0.01
  ent_thr: 0.3
  fixed_weights: true
  loss_s_ce: 1.0
  loss_t_im_div: 0.6
  loss_t_im_ent: 1.0
  metric_temp: 0.01
  n_keep_status: 5
  source: true
  target: true
  target_classnames: discovered
  templates_sampling_rate: 0.1
  templates_type: ensemble
  text_temp: 0.02
model:
  lora_r: 8
  lora_r_t: 8
  name: ViT-B/16
optimizer:
  backbone_lr: 0.0001
  momentum: 0.9
  weight_decay: 0.0005
test:
  none: none
train:
  none: none
